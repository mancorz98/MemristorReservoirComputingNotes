name: Build LaTeX document
on: [push]

permissions:
  contents: write # This allows pushing to the repo

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main_en.tex
          latexmk_shell_escape: true
          os: debian

      - name: Upload PDF file
        uses: actions/upload-artifact@v6
        with:
          name: PDF
          path: main_en.pdf

      - name: Upload to orphan branch
        run: |
          DATE=$(date +"%Y-%m-%d %H:%M:%S")
          PDF_PATH="${PWD}/main_en.pdf"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          cp main_en.pdf /tmp/manuscript.pdf
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git checkout --orphan pdf-output
          git rm -rf . 

          cp /tmp/manuscript.pdf ./manuscript.pdf
          git add manuscript.pdf
          git commit -m "Update PDF from ${DATE} - ${COMMIT_MSG}"
          git push -f origin pdf-output

      - name: Checkout main again
        uses: actions/checkout@v6

      - name: Create Release
        run: |
          TAG="build-$(date +%Y%m%d-%H%M)"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Build ${{ env.TAG }}
          files: main_en.pdf
          make_latest: true
